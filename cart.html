<!doctype html>
<html lang="ka">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ESSENCE - თქვენი კალათა. გადახედეთ არჩეულ სუნამოებს და გააფორმეთ შეკვეთა." />
    <meta name="author" content="Nika" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/fonts.css">
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="icon" href="./imgs/ESSENCE.svg" />
    <title>კალათა - ESSENCE</title>
  </head>
  <body>
    <header>
      <div class="header container-wide flex">
        <i class="fa-solid fa-bars burger-menu"></i>
        <a href="./index.html"><img src="./imgs/ESSENCE.svg" alt="Logo" /></a>
        <nav class="navigation">
          <ul class="nav-ul flex">
            <li><a href="./index.html" class="nav-a">მთავარი</a></li>
            <li><a href="./about.html" class="nav-a">ჩვენს შესახებ</a></li>
            <li><a href="./fragrance.html" class="nav-a">სუნამოები</a></li>
            <li><a href="./contact.html" class="nav-a">კონტაქტი</a></li>
          </ul>
        </nav>
        <a href="./cart.html" class="cart-link">
          <i class="fa-solid fa-cart-arrow-down cart"></i>
          <span class="cart-count">0</span>
        </a>
      </div>
    </header>
    <main class="cart-main">
      <section class="cart-section container">
        <h1 class="cart-page-title">კალათა</h1>

        <div class="cart-content flex">
          <div class="cart-items" id="cartItems"></div>

          <p class="empty-cart" id="emptyCartMsg" style="display: none">
            კალათა ცარიელია.<br />
            აირჩიეთ სასურველი სუნამო ჩვენი კოლექციიდან.<br />
            <a href="./fragrance.html"
              ><button class="discover-button">სუნამოების ნახვა</button></a
            >
          </p>

          <div class="summary-box shadow-card" id="summaryBox">
            <h2>შეკვეთის დეტალები</h2>
            <div class="summary-row">
              <span class="details">ქვეჯამი</span>
              <span class="subtotal" id="subtotal">₾ 0.00</span>
            </div>
            <div class="summary-row">
              <span class="details">მიტანა</span>
              <span class="details">უფასო</span>
            </div>
            <hr class="summary-divider" />
            <div class="summary-total">
              <span class="details">ჯამური თანხა</span>
              <span class="total" id="total">₾ 0.00</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn">
              შეკვეთის გაფორმება
            </button>
          </div>
        </div>
      </section>
    </main>
    <footer>
      <div class="footer container-wide flex">
        <a href="./index.html"><img src="./imgs/ESSENCE.svg" alt="Logo" /></a>
        <ul class="footer-ul nav-ul flex">
          <li><a href="./index.html" class="nav-a">მთავარი</a></li>
          <li><a href="./about.html" class="nav-a">ჩვენს შესახებ</a></li>
          <li><a href="./fragrance.html" class="nav-a">სუნამოები</a></li>
          <li><a href="./contact.html" class="nav-a">კონტაქტი</a></li>
        </ul>
        <p class="security">© 2024 Essence . ყველა უფლება დაცულია.</p>
      </div>
    </footer>
    <script src="./script.js"></script>
    <script src="./cart.js"></script>
  </body>
</html>
